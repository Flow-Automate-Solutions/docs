# Reverse proxy for the mint-internal preview.
# Templated by deploy.sh: __DOMAIN__ is substituted at deploy time.
#
# TLS is terminated at Cloudflare. This vhost only serves HTTP on port 80
# and expects to be reached via the Cloudflare proxy. Lock the origin's
# security group to Cloudflare IP ranges to prevent direct bypass.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __DOMAIN__;

    auth_basic           "Magic CMS internal docs preview";
    auth_basic_user_file /etc/nginx/htpasswd-mint-internal;

    # mint dev uses websockets for HMR.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Trust the X-Forwarded-Proto Cloudflare sends so mint-dev knows
        # the original request was HTTPS.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
    }
}
