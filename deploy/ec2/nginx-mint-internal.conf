# Reverse proxy for the mint-internal preview.
# Templated by deploy.sh: __DOMAIN__ is substituted at deploy time.
# TLS cert paths assume Let's Encrypt's standard layout under /etc/letsencrypt/live/.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # ACME HTTP-01 challenge directory for certbot renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    auth_basic           "Magic CMS internal docs preview";
    auth_basic_user_file /etc/nginx/htpasswd-mint-internal;

    # mint dev uses websockets for HMR.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
